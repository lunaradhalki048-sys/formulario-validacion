<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario con Validación</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    form {
      background: #fff;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    .error {
      color: red;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

<h2 style="text-align:center;">Formulario de Registro</h2>

<form id="formulario">
  <input type="text" id="nombre" placeholder="Nombre" required>
  <div id="errorNombre" class="error"></div>

  <input type="email" id="email" placeholder="Correo electrónico" required>
  <div id="errorEmail" class="error"></div>

  <input type="password" id="password" placeholder="Contraseña" required minlength="6">
  <div id="errorPassword" class="error"></div>

  <button type="submit">Enviar</button>
</form>

<script>
  const form = document.getElementById("formulario");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    let valido = true;

    // Limpiar errores
    document.getElementById("errorNombre").textContent = "";
    document.getElementById("errorEmail").textContent = "";
    document.getElementById("errorPassword").textContent = "";

    const nombre = document.getElementById("nombre").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // Validar nombre
    if (nombre.length < 3) {
      document.getElementById("errorNombre").textContent = "El nombre debe tener al menos 3 caracteres";
      valido = false;
    }

    // Validar email
    const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regexEmail.test(email)) {
      document.getElementById("errorEmail").textContent = "Correo no válido";
      valido = false;
    }

    // Validar contraseña
    if (password.length < 6) {
      document.getElementById("errorPassword").textContent = "La contraseña debe tener al menos 6 caracteres";
      valido = false;
    }

    if (valido) {
      alert("Formulario enviado correctamente 🎉");
      form.reset();
    }
  });
</script>

</body>
</html>
